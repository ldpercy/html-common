<!doctype html>
<html lang="en">
<head>
	<title>Planar space _test</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../style/html-common.css">
	<script type="module" src="../script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1><a href="">Planar space _test</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<main>
		<script type="module" class="fullwidth">
			import * as test from '../testing/testing.js';
			import * as predicate from '../testing/predicate.js';
			import * as ps from './PlanarSpace.js'


			console.groupCollapsed('setup default planar space');
				let dps = new ps.Space(ps.defaultSpaceSettings, 'default planar space');
				console.log('dps:', dps);

				let p1 = dps.newPoint(dps.newCartesianCoordinates(100,100), 'test point');
				console.log('p1:', p1.cartesian, p1);

			console.groupEnd();


			const pst1 = new test.Test(
				'Default cartesian quadrant test',
				new predicate.AllEqual(),
				[
					//[	p1.setCartesian(123,456).polar.angle.degrees,	789],
					[	45,		p1.setCartesian(100,100).polar.angle.degrees],
					[	-45,	p1.setCartesian(-100,100).polar.angle.degrees],
					[	135,	p1.setCartesian(100,-100).polar.angle.degrees],
					[	-135,	p1.setCartesian(-100,-100).polar.angle.degrees]
				]
			);
			pst1.toConsole();



			console.groupCollapsed('Setup configured planar space - maths conventions');

				let mathsConventions = {polarAxis:'x', polarDirection: 'anticlockwise'};

				let cps = new ps.Space(mathsConventions, 'Planar space using maths conventions');
				console.log('cps', cps);

				let p2 = cps.newPoint().setCartesian(15,20);
				console.log('p2', p2);
			console.groupEnd();


			const pst2 = new test.Test(
				'Conventional geometry quadrant test',
				new predicate.AllEqual(),
				[
					[	0,		p2.setCartesian(100,0).polar.angle.degrees],
					[	45,		p2.setCartesian(100,100).polar.angle.degrees],
					[	90,		p2.setCartesian(0,100).polar.angle.degrees],
					[	135,	p2.setCartesian(-100,100).polar.angle.degrees],
					[	-45,	p2.setCartesian(100,-100).polar.angle.degrees],
					[	-90,	p2.setCartesian(0,-100).polar.angle.degrees],
					[	-135,	p2.setCartesian(-100,-100).polar.angle.degrees]
				]
			);
			pst2.toConsole();



		</script>


	</main>

</body>
</html>
