<!doctype html>
<html lang="en">
<head>
	<title>Planar space _test</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../style/html-common.css">
	<script type="module" src="../script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1><a href="">Planar space _test</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<main>
		<details name="test_set" class="fullwidth">
			<summary>Preconfigured space tests</summary>
			<script type="module" title="Preconfigured space tests">
			console.info('preconfigured space setting tests');

			import * as test from '../testing/testing.js';
			import * as predicate from '../testing/predicate.js';
			import * as ps from './PlanarSpace.js'

			function mat2(x,y) { return Math.atan2(y,x); }


			console.groupCollapsed('Setup default (navigational) planar space');
				let nps = new ps.Space(undefined, 'default planar space');
				console.log('nps:', nps);

				let np = nps.newPoint(nps.newCartesianCoordinates(100,100), 'test point');
				console.log('np:', np.cartesian, np);

			console.groupEnd();


			new test.Test(
				'Default (navigational) quadrant test',
				new predicate.AllEqual(),
				[
					//[	np.setCartesian(123,456).polar.angle.degrees,	789],
					[	45,		np.setCartesian(100,100).polar.angle.degrees],
					[	-45,	np.setCartesian(-100,100).polar.angle.degrees],
					[	135,	np.setCartesian(100,-100).polar.angle.degrees],
					[	-135,	np.setCartesian(-100,-100).polar.angle.degrees]
				]
			).toConsole();


			console.groupCollapsed('Setup planar space - maths conventions');

				let mps = new ps.Space(ps.settings_maths, 'Planar space using maths conventions');
				console.log('mps', mps);

				let mp = mps.newPoint().setCartesian(15,20);
				console.log('mp', mp);

			console.groupEnd();


			new test.Test(
				'Maths conventions quadrant test',
				new predicate.AllEqual(),
				[
					[	0,		mp.setCartesian(100,0).polar.angle.degrees],
					[	45,		mp.setCartesian(100,100).polar.angle.degrees],
					[	90,		mp.setCartesian(0,100).polar.angle.degrees],
					[	135,	mp.setCartesian(-100,100).polar.angle.degrees],
					[	-45,	mp.setCartesian(100,-100).polar.angle.degrees],
					[	-90,	mp.setCartesian(0,-100).polar.angle.degrees],
					[	-135,	mp.setCartesian(-100,-100).polar.angle.degrees]
				]
			).toConsole();

			new test.Test(
				'Maths conventions should be the same as atan2',
				new predicate.AllEqual(),
				[
					[	mat2(100,0),		mp.setCartesian(100,0).polar.angle.radians],
					[	mat2(100,100),		mp.setCartesian(100,100).polar.angle.radians],
					[	mat2(0,100),		mp.setCartesian(0,100).polar.angle.radians],
					[	mat2(-100,100),		mp.setCartesian(-100,100).polar.angle.radians],
					[	mat2(100,-100),		mp.setCartesian(100,-100).polar.angle.radians],
					[	mat2(0,-100),		mp.setCartesian(0,-100).polar.angle.radians],
					[	mat2(-100,-100),	mp.setCartesian(-100,-100).polar.angle.radians]
				]
			).toConsole();

		</script>
		</details>

		<details name="test_set" class="fullwidth" open>
			<summary>Custom space tests - maths variants (anticlockwise)</summary>
			<script type="module"  title="Custom space tests">
			console.info('Custom space setting tests:');
			import * as test from '../testing/testing.js';
			import * as predicate from '../testing/predicate.js';
			import * as ps from './PlanarSpace.js'

			console.groupCollapsed('Setup custom planar space');


				let customSettings = {polarAxis:'down', polarDirection: 'anticlockwise'};

				let customSpace1 = new ps.Space(customSettings, 'Polar axis down, anticlockwise');
				console.log('customSpace1', customSpace1);

				let p3 = customSpace1.newPoint().setCartesian(15,20);
				console.log('p3', p3);
			console.groupEnd();


			const pst3 = new test.Test(
				'Test: Custom configuration quadrant test',
				new predicate.AllEqual(),
				[
					[	0,		p3.setCartesian(0,-100).polar.angle.degrees],
					[	45,		p3.setCartesian(100,-100).polar.angle.degrees],
					[	90,		p3.setCartesian(100,0).polar.angle.degrees],
					[	135,	p3.setCartesian(100,100).polar.angle.degrees],
					[	-45,	p3.setCartesian(-100,-100).polar.angle.degrees],
					[	-90,	p3.setCartesian(-100,0).polar.angle.degrees],
					[	-135,	p3.setCartesian(-100,100).polar.angle.degrees]
				]
			);
			pst3.toConsole();



		</script>
		</details>

	</main>

</body>
</html>
