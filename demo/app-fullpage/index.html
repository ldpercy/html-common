<!doctype html>
<html lang="en" data-colourscheme="light">
<head>
	<title>Demo full page app</title>
	<meta charset="utf-8">
	<meta name="description" content="Demo full page app">
	<meta name="theme-color" content="mediumvioletred"/>
	<meta name="color-scheme" content="dark light">
	<link rel="icon" href="../../favicon.svg"/>

	<link rel="stylesheet" href="./index.css"/>
	<!-- <script  type="module"  src="./index.js"></script> -->
</head>
<body>

	<header>
		<div class="control-group control-left">
			<form id="form-application" name="application" tabindex="0" class="ui-panel">
				<h1>Demo full page app</h1>

				<label class="scheme" title="Colour scheme">
					<label title="Light scheme">
						<input type="radio" name="colourScheme" value="light" class="colourScheme-selector" data-colourscheme="light" checked>
						light
					</label>
					<label title="Dark scheme">
						<input type="radio" name="colourScheme" value="dark" class="colourScheme-selector" data-colourscheme="dark">
						dark
					</label>
				</label>

				<button type="button" id="button-showAppInfo"><strong>🛈 Demo full page app</strong></button>

			</form>
		</div><!-- control-left -->
	</header>

	<main id="main-document-area">
		<!-- main-svg
		-->
		<svg id="main-svg" class="main-svg" viewBox="-1200 -1200 2400 2400" preserveAspectRatio="xMidYMid meet" tabindex="0">

			<defs>
				<path id="def-marker"  d="m0,-30 L10,10 L-10 10 z"/>  <!-- class="marker" -->
				<circle id="def-point" class="def-point"/>

				<g class="grid">
					<marker id="axisMarker-cartesian" class="axis" markerWidth="100" markerHeight="100" refX="0" refY="0" viewBox="-50 -50 100 100" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
						<path d="m-20,-20 L50,0 L-20,20 "/>
					</marker>
					<marker id="axisMarker-polar" class="axis" markerWidth="100" markerHeight="100" refX="0" refY="0" viewBox="-50 -50 100 100" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
						<path d="m20,-20 L0,50 L-20,-20"/>
					</marker>
				</g>

			</defs>

			<g id="group-page" class="page">
				<g id="group-grid" class="grid">
					<g id="group-cartesian">
						<g id="group-cartesianGrid" class="cartesian-grid"></g>
						<g id="group-cartesianPoint" class="cartesian-point"></g>
					</g>
				</g>

				<g id="group-drawing" class="drawing">
					<!-- drawing elements go in here -->

					<g class="pageItem" transform="translate(-555 -444)">
						<circle class="itemHandle">
							<title>page item title text</title>
						</circle>
						<foreignObject width="500" height="500" class="pageItem-html">
							<main>
								<pre contenteditable="plaintext-only">
									Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
									Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.
									Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.
									Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.
								</pre>
							</main>
						</foreignObject>
					</g><!-- page item -->


				</g><!-- group-drawing -->

			</g><!-- page -->
		</svg>
	</main>

	<dialog id="dialog-appInfo" closedby="any">
		<h1>
			<a href="https://github.com/ldpercy/html-common">Demo full page app</a>
			<a href="https://github.com/ldpercy/html-common/releases/tag/v0.0.0">v0.0.0</a>
			by <a href="https://github.com/ldpercy/">ldpercy</a>
		</h1>

		<h2>Keyboard shortcuts</h2>
		<dl>
			<dt><kbd>?</kbd></dt>
			<dd>Show this dialog</dd>
		</dl>
	</dialog>


</body>
</html>
