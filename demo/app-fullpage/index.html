<!doctype html>
<html lang="en" data-colourscheme="light">
<head>
	<title>Demo full page app</title>
	<meta charset="utf-8">
	<meta name="description" content="Demo full page app">
	<meta name="theme-color" content="mediumvioletred"/>
	<meta name="color-scheme" content="dark light">
	<link rel="icon" href="../../favicon.svg"/>

	<link rel="stylesheet" href="./index.css"/>
	<!-- <script  type="module"  src="./index.js"></script> -->
</head>
<body>

	<header>
		<div class="panel-group group-left">
			<form id="form-application" name="application" tabindex="0" class="ui-panel">
				<h1>Demo full page app</h1>

				<fieldset class="flex1" title="Colour scheme">
					<label title="Light scheme">
						<input type="radio" name="colourScheme" value="light" class="colourScheme-selector" data-colourscheme="light" checked>
						light
					</label>
					<label title="Dark scheme">
						<input type="radio" name="colourScheme" value="dark" class="colourScheme-selector" data-colourscheme="dark">
						dark
					</label>
				</fieldset>

				<button type="button" id="button-showAppInfo" onclick="document.getElementById('dialog-appInfo').showModal();">🛈 Demo full page app</button>


				<h1>h1</h1>
				<h2>h2</h2>
				<h3>h3</h3>
				<h4>h4</h4>
				<h5>h5</h5>

				<p>paragraph</p>


				<label for="input-centerTurtle" title="Center the turtle on the page">
					<input type="checkbox" name="centerTurtle" id="input-centerTurtle" checked>
					center page
				</label>
				<label for="input-rotatePage" title="Rotate the page with the turtle's direction">
					<input type="checkbox" name="rotatePage" id="input-rotatePage">
					rotate page
				</label>


			</form>
		</div><!-- panel-left -->


		<div class="panel-group group-right">
			<div class="ui-panel">
				<p>asdasd</p>

				<details>
					<summary>
						summary text
					</summary>
					details body
				</details>

				<input type="range" name="range">


				<label title="radio 1">
					<input type="radio" name="radio-1" value="1" checked>
					radio 1
				</label>
				<label title="radio 2">
					<input type="radio" name="radio-1" value="2">
					radio 2
				</label>
				<label title="radio 3">
					<input type="radio" name="radio-1" value="3">
					radio 3
				</label>
				<label title="radio 4">
					<input type="radio" name="radio-1" value="4">
					radio 4
				</label>
				<!--
				<input type="radio" name="radio-1" value="5">
				<label title="radio 5">
					radio 5
				</label>
				 -->

				<details open>
					<summary><h3>page</h3></summary>
					<fieldset>
						<label for="input-pageColour" class="colourWithRandom" >
							colour
						</label>
						<div class="flex1">
							<input type="color" name="pageColour" id="input-pageColour" value="#0a0a0a">
							<button type="button" name="pageColourRandom" id="button-pageColourRandom">🎲</button>
						</div>


						<label for="input-blendMode">blend mode</label>
						<select id="input-blendMode" name="blend mode" size="1">
							<option>aaa</option>
							<option>bbb</option>
							<option>ccc</option>
						</select>
					</fieldset>
				</details><!-- page -->


			</div>

		</div>



	</header>

	<main id="main-document-area">
		<!-- main-svg
		-->
		<svg id="main-svg" class="main-svg" viewBox="-1200 -1200 2400 2400" preserveAspectRatio="xMidYMid meet" tabindex="0">


		</svg>
	</main>


	<dialog id="dialog-appInfo" closedby="any">
		<h1>
			<a href="https://github.com/ldpercy/html-common">Demo full page app</a>
			<a href="https://github.com/ldpercy/html-common/releases/tag/v0.0.0">v0.0.0</a>
			by <a href="https://github.com/ldpercy/">ldpercy</a>
		</h1>

		<h2>Keyboard shortcuts</h2>
		<dl>
			<dt><kbd>?</kbd></dt>
			<dd>Show this dialog</dd>
		</dl>
	</dialog>


</body>
</html>
